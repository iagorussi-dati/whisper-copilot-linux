<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Whisper Copilot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  #messages { flex: 1; overflow-y: auto; padding: 12px; }
  .msg { margin-bottom: 8px; font-size: 14px; line-height: 1.5; }
  .msg-user .label { color: #a78bfa; font-weight: 600; }
  .msg-bot .label { color: #fbbf24; font-weight: 600; }
  .msg-bot .text { background: #1e293b; border-radius: 8px; padding: 10px 14px; margin-top: 4px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
  .msg-system { color: #64748b; font-style: italic; font-size: 13px; }
  .msg-transcript { color: #94a3b8; font-size: 13px; }
  .msg-transcript .speaker { color: #60a5fa; font-weight: 600; }
  .msg-action { color: #a78bfa; font-size: 13px; font-weight: 500; }
  .msg-status { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 6px; font-size: 12px; margin-bottom: 8px; }
  .status-recording { background: #7f1d1d30; color: #fca5a5; }
  .status-ready { background: #14532d30; color: #86efac; }
  .status-thinking { background: #1e1b4b30; color: #c4b5fd; }
  #input-bar { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid #1e293b; background: #0f172a; }
  #chat-input { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 8px 12px; color: #e2e8f0; font-size: 14px; outline: none; }
  #chat-input:focus { border-color: #8b5cf6; }
  #chat-input::placeholder { color: #64748b; }
  #chat-input:disabled { opacity: 0.5; }
  #send-btn { background: #7c3aed; color: white; border: none; border-radius: 6px; padding: 8px 16px; font-size: 14px; cursor: pointer; }
  #send-btn:hover { background: #6d28d9; }
  #send-btn:disabled { background: #334155; cursor: not-allowed; }
  .pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div id="messages">
  <div class="msg msg-system">Copiloto pronto. Aperte Espaço para gravar.</div>
</div>
<div id="input-bar">
  <input id="chat-input" type="text" placeholder="Instrução para o copiloto (Enter = enviar)" autofocus />
  <button id="send-btn">Enviar</button>
</div>
<script>
  function getApi() { return window.pywebview ? window.pywebview.api : null; }
  window.__emit = function(event, data) {
    window.dispatchEvent(new CustomEvent('backend:' + event, { detail: data }));
  };

  const msgs = document.getElementById('messages');
  const input = document.getElementById('chat-input');
  const btn = document.getElementById('send-btn');
  let isRecording = false;
  let hasTranscript = false;
  let transcriptionDone = false;
  let pendingSend = null;
  let recStartTime = null;
  let recTimerInterval = null;

  function updateRecTimer() {
    const el = document.getElementById('rec-timer');
    if (!el || !recStartTime) return;
    const s = Math.floor((Date.now() - recStartTime) / 1000);
    const m = String(Math.floor(s / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    el.textContent = `${m}:${sec}`;
  }

  function addMsg(cls, html) {
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.innerHTML = html;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function setStatus(cls, text) {
    // Remove previous status
    msgs.querySelectorAll('.msg-status').forEach(el => el.remove());
    if (text) {
      const div = document.createElement('div');
      div.className = 'msg-status ' + cls;
      div.innerHTML = text;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }
  }

  function clearProcessing() {
    const last = msgs.querySelector('.status-thinking');
    if (last) last.remove();
  }

  function enableInput(placeholder) {
    input.disabled = false;
    btn.disabled = false;
    if (placeholder) input.placeholder = placeholder;
    function tryFocus() {
      input.focus();
      input.click();
    }
    tryFocus();
    setTimeout(tryFocus, 200);
    setTimeout(tryFocus, 600);
    setTimeout(tryFocus, 1000);
  }

  function disableInput() {
    input.disabled = true;
    btn.disabled = true;
  }

  // Restore history
  async function restoreHistory() {
    const a = getApi();
    if (!a) return;
    try {
      const history = await a.get_chat_history();
      if (!history || !history.length) return;
      for (const entry of history) processEvent(entry.event, entry.data);
    } catch(e) { console.error('restore:', e); }
  }

  function processEvent(event, data) {
    switch(event) {
      case 'recording_state':
        isRecording = data.recording;
        if (data.recording) {
          transcriptionDone = false;
          recStartTime = Date.now();
          recTimerInterval = setInterval(updateRecTimer, 1000);
          setStatus('status-recording', '🔴 <span class="pulse">Gravando</span> <span id="rec-timer">00:00</span>');
          disableInput();
        } else {
          if (recTimerInterval) { clearInterval(recTimerInterval); recTimerInterval = null; }
          setStatus('', '');
        }
        break;
      case 'recording_stopped':
        // Enable input immediately so user can type while transcription happens
        setStatus('status-ready', '⏳ Transcrevendo... digite sua instrução');
        enableInput('Instrução (Enter envia após transcrição)');
        break;
      case 'transcript':
        hasTranscript = true;
        addMsg('msg-transcript', '<span class="speaker">[' + data.speaker + ']</span> ' + data.text);
        break;
      case 'copilot_response':
        clearProcessing();
        if (data.response) {
          addMsg('msg-bot', '<span class="label">Copiloto:</span><div class="text">' + data.response + '</div>');
        }
        setStatus('status-ready', '✅ Pronto — grave mais ou digite outra instrução');
        enableInput('Instrução (Enter vazio = copiloto responde sozinho)');
        break;
      case 'user_instruction':
        addMsg('msg-user', '<span class="label">Você:</span> ' + data.text);
        break;
    }
  }

  async function send() {
    const msg = input.value.trim();
    input.value = '';

    if (!transcriptionDone) {
      // Queue it — will send after transcription finishes
      pendingSend = msg;
      if (msg) addMsg('msg-user', '<span class="label">Você:</span> ' + msg);
      setStatus('status-thinking', '⏳ <span class="pulse">Aguardando transcrição...</span>');
      disableInput();
      return;
    }

    doSend(msg);
  }

  async function doSend(msg) {
    disableInput();
    if (msg) addMsg('msg-user', '<span class="label">Você:</span> ' + msg);
    setStatus('status-thinking', '⏳ <span class="pulse">Copiloto pensando...</span>');
    try {
      const a = getApi();
      if (a) await a.submit_recording(msg);
    } catch(e) {
      addMsg('msg-system', 'Erro: ' + e);
      enableInput();
    }
  }

  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
  btn.addEventListener('click', send);

  // Live events
  window.addEventListener('backend:transcript', (e) => processEvent('transcript', e.detail));
  window.addEventListener('backend:copilot_response', (e) => processEvent('copilot_response', e.detail));
  window.addEventListener('backend:recording_state', (e) => processEvent('recording_state', e.detail));
  window.addEventListener('backend:recording_stopped', (e) => processEvent('recording_stopped', e.detail));
  window.addEventListener('backend:chat_thinking', () => {
    setStatus('status-thinking', '⏳ <span class="pulse">Copiloto pensando...</span>');
    disableInput();
  });

  window.addEventListener('backend:snapshot_started', () => {
    setStatus('status-ready', '📸 Snapshot — transcrevendo...');
    transcriptionDone = false;
    enableInput('Instrução (Enter envia após transcrição)');
  });

  window.addEventListener('backend:session_reset', () => {
    msgs.innerHTML = '<div class="msg msg-system">Nova sessão. Copiloto pronto.</div>';
    hasTranscript = false;
    disableInput();
  });

  window.addEventListener('backend:focus_input', () => {
    transcriptionDone = true;
    setStatus('status-ready', '✅ Transcrição pronta');
    // If user already typed and pressed Enter, send now
    if (pendingSend !== null) {
      const msg = pendingSend;
      pendingSend = null;
      doSend(msg);
    }
  });

  // Init
  let popupReady = false;
  function markReady() {
    popupReady = true;
    console.log('[POPUP] Ready at ' + Date.now());
    restoreHistory();
  }
  if (window.pywebview) markReady();
  else window.addEventListener('pywebviewready', markReady);

  // Log all incoming events
  ['transcript', 'copilot_response', 'recording_state', 'recording_stopped', 'chat_thinking'].forEach(evt => {
    window.addEventListener('backend:' + evt, (e) => {
      console.log('[POPUP] Event: ' + evt + ' ready=' + popupReady + ' inputDisabled=' + input.disabled);
    });
  });

  // Force focus on click anywhere in the window
  document.body.addEventListener('click', () => {
    if (!input.disabled) {
      input.focus();
    }
  });

  // Also try focus on any key press
  document.addEventListener('keydown', (e) => {
    if (!input.disabled && document.activeElement !== input) {
      input.focus();
    }
  });
</script>
</body>
</html>
