<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whisper Copilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
    select { color: #f1f5f9 !important; background-color: #1e293b !important; -webkit-appearance: none; }
    select option { color: #f1f5f9; background-color: #1e293b; }
    .vu-bar { transition: width 150ms ease; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse { animation: pulse 1.5s infinite; }
    #transcript-area { scroll-behavior: smooth; }
    .markdown-body h2 { font-size: 1.25rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #f1f5f9; }
    .markdown-body p { margin-bottom: 0.5rem; }
    .markdown-body ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 0.5rem; }
    .markdown-body li { margin-bottom: 0.25rem; }
  </style>
</head>
<body class="min-h-screen">

<!-- Event bus -->
<script>
  window.__emit = function(event, data) {
    window.dispatchEvent(new CustomEvent('backend:' + event, { detail: data }));
  };
</script>

<div id="app" class="max-w-3xl mx-auto p-4"></div>

<script>
// ── State ──
const state = {
  page: 'setup', // setup | meeting | summary
  config: {
    transcription_provider: 'groq', diarization_provider: 'local',
    groq_api_key: '', aws_profile: 'poc_iago', aws_region: 'us-east-1',
    bedrock_model_id: 'us.anthropic.claude-sonnet-4-20250514-v1:0',
    whisper_model: 'whisper-large-v3-turbo', language: 'pt',
    chunk_seconds: 60, diarization_threshold: 0.25,
    mic_device_id: '', monitor_device_id: '', my_name: '', participants: [],
    suggestions_target: '', custom_system_prompt: '', global_hotkey: '',
  },
  devices: [],
  micTest: 'idle', monitorTest: 'idle', awsValid: 'idle', awsInfo: '',
  tab: 'admin',
  // Meeting
  transcript: [],
  suggestions: [],
  roles: {},
  isAnalyzing: false,
  isProcessing: false,
  isRecording: false,
  timerStart: null, timerDisplay: '00:00:00',
  micLevel: 0, monitorLevel: 0,
  // Summary
  summary: '', summaryLoading: false,
};

let timerInterval = null;

// ── API helpers ──
const api = () => window.pywebview?.api;

async function callApi(method, ...args) {
  const a = api();
  if (!a) { console.warn('API not ready'); return null; }
  try { return await a[method](...args); }
  catch (e) { console.error(`API ${method} error:`, e); throw e; }
}

// ── Render ──
let _rendering = false;
let _renderCount = 0;
function render() {
  if (_rendering) { console.warn('RENDER BLOCKED (recursive)'); return; }
  _rendering = true;
  _renderCount++;
  const n = _renderCount;
  console.log(`[RENDER #${n}] page=${state.page}, mic=${state.config.mic_device_id}, mon=${state.config.monitor_device_id}`);
  if (n > 50) { console.error('RENDER LOOP DETECTED, stopping'); _rendering = false; return; }
  try {
    const app = document.getElementById('app');
    if (state.page === 'setup') app.innerHTML = renderSetup();
    else if (state.page === 'meeting') app.innerHTML = renderMeeting();
    else if (state.page === 'summary') app.innerHTML = renderSummary();
    bindEvents();
  } catch(e) {
    console.error('[RENDER ERROR]', e);
  }
  _rendering = false;
  console.log(`[RENDER #${n}] done`);
}

// ── SETUP PAGE ──
function renderSetup() {
  const c = state.config;
  const inputDevs = state.devices.filter(d => d.deviceType === 'input');
  const monitorDevs = state.devices.filter(d => d.deviceType === 'output' || d.deviceType === 'monitor');
  const hasDevice = (c.mic_device_id && c.mic_device_id !== 'none') || (c.monitor_device_id && c.monitor_device_id !== 'none');
  const canStart = hasDevice && state.awsValid === 'ok';

  return `
    <h1 class="text-2xl font-bold text-center mb-6">Whisper Copilot</h1>
    <p class="text-xs text-slate-500 mb-4">Usa as API keys do .env automaticamente.</p>

    <!-- Transcription provider -->
    <h2 class="text-lg font-semibold mb-2">Transcrição</h2>
    <div class="flex gap-2 mb-2">
      <button class="flex-1 py-2 text-xs rounded border border-emerald-500 bg-emerald-500/10 text-emerald-400">Groq Whisper</button>
    </div>
    <p class="text-xs text-amber-400/70 mb-4">⚠️ Groq: limite de 20 req/min. Chunk mínimo: 30s</p>

    <!-- Diarization -->
    <h2 class="text-lg font-semibold mb-2">Diarização (quem falou)</h2>
    <div class="flex gap-2 mb-2">
      ${[{id:'local',label:'Ativado'},{id:'none',label:'Desativado'}].map(d => `
        <button data-action="setDiar" data-val="${d.id}" class="flex-1 py-2 text-xs rounded border transition-colors ${c.diarization_provider === d.id ? 'border-violet-500 bg-violet-500/10 text-violet-400' : 'border-slate-700 text-slate-400 hover:border-slate-500'}">${d.label}</button>
      `).join('')}
    </div>
    ${c.diarization_provider === 'local' ? `
      <div class="mb-4">
        <div class="flex justify-between text-xs text-slate-400">
          <span>Sensibilidade:</span><span>${c.diarization_threshold.toFixed(2)}</span>
        </div>
        <input type="range" min="0.1" max="0.9" step="0.05" value="${c.diarization_threshold}" data-bind="diarization_threshold"
          class="w-full mt-1 accent-slate-400" />
        <p class="text-xs text-slate-500 mt-1">↓ agrupa mais vozes, ↑ separa mais vozes</p>
      </div>
    ` : ''}

    <!-- Audio devices -->
    <h2 class="text-lg font-semibold mb-2">Dispositivos de Áudio</h2>
    ${renderDeviceSelector('mic', '🎙️ Microfone', inputDevs, c.mic_device_id, state.micTest)}
    ${renderDeviceSelector('monitor', '🔊 Autofalante', monitorDevs, c.monitor_device_id, state.monitorTest)}

    <!-- AWS -->
    <h2 class="text-lg font-semibold mb-2">Sugestões IA (Bedrock)</h2>
    <div class="flex gap-2 items-center mb-2">
      <button data-action="validateAws" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm transition-colors">Validar AWS</button>
      ${state.awsValid !== 'idle' ? `<span class="text-sm">${state.awsValid === 'testing' ? '⏳' : state.awsValid === 'ok' ? '✅' : '❌'}</span>` : ''}
      ${state.awsInfo ? `<span class="text-xs text-slate-400">${state.awsInfo}</span>` : ''}
    </div>

    <!-- Participants -->
    <h2 class="text-lg font-semibold mt-4 mb-2">Participantes (opcional)</h2>
    <p class="text-xs text-slate-500 mb-2">A IA identifica quem é quem com base nas falas.</p>
    ${c.participants.map((p, i) => `
      <div class="flex gap-2 mb-2 items-center">
        <input type="text" data-action="updateParticipant" data-idx="${i}" data-field="name" value="${p.name}" placeholder="Nome"
          class="flex-1 bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500" />
        <input type="text" data-action="updateParticipant" data-idx="${i}" data-field="role" value="${p.role}" placeholder="Descrição"
          class="flex-1 bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500" />
        <button data-action="removeParticipant" data-idx="${i}" class="text-slate-500 hover:text-red-400 text-lg px-1">×</button>
      </div>
    `).join('')}
    <button data-action="addParticipant" class="text-xs text-slate-400 hover:text-slate-300 mb-4">+ Adicionar participante</button>

    <!-- Suggestions target -->
    <div class="mb-4">
      <label class="text-xs text-slate-400">Sugestões direcionadas para:</label>
      <select data-bind="suggestions_target"
        class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500 mt-1">
        <option value="" ${!c.suggestions_target ? 'selected' : ''}>Todos</option>
        ${c.participants.filter(p => p.name).map(p => `<option value="${p.name}" ${c.suggestions_target === p.name ? 'selected' : ''}>${p.name}</option>`).join('')}
      </select>
      <p class="text-xs text-slate-500 mt-1">A IA vai gerar sugestões pensando nessa pessoa.</p>
    </div>

    <!-- System Prompt -->
    <h2 class="text-lg font-semibold mt-4 mb-2">System Prompt (opcional)</h2>
    <p class="text-xs text-slate-500 mb-2">Define o comportamento das sugestões. Selecione um template ou carregue um arquivo.</p>
    <div class="flex gap-2 mb-2">
      <select data-action="selectTemplate"
        class="flex-1 bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500">
        <option value="">Selecione um template...</option>
        <option value="discovery">📋 Discovery Comercial (Dati)</option>
        <option value="piadas">🎭 Piadas e Humor</option>
        <option value="vendas">💰 Copiloto de Vendas</option>
        <option value="custom">📄 Carregar arquivo...</option>
      </select>
    </div>
    <input type="file" data-action="loadPromptFile" accept=".md,.txt,.markdown"
      class="text-xs text-slate-400 mb-2" style="display:none" id="promptFileInput" />
    <textarea data-bind="custom_system_prompt" rows="6" placeholder="Ex: Você é um copiloto de vendas. Sugira técnicas de fechamento quando o cliente demonstrar interesse..."
      class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500 resize-y">${c.custom_system_prompt}</textarea>
    ${c.custom_system_prompt ? `<p class="text-xs text-emerald-400 mt-1">✅ System prompt carregado (${c.custom_system_prompt.length} chars)</p>` : ''}

    <!-- Settings -->
    <h2 class="text-lg font-semibold mt-4 mb-2">Configurações</h2>
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="text-xs text-slate-400">Idioma</label>
        <input type="text" data-bind="language" value="${c.language}"
          class="w-full mt-1 bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500" />
      </div>
      <div>
        <label class="text-xs text-slate-400">Modo de transcrição</label>
        <div class="flex gap-2 mt-1">
          <button data-action="setChunkMode" data-val="auto" class="flex-1 py-2 text-xs rounded border transition-colors ${c.chunk_seconds > 0 ? 'border-emerald-500 bg-emerald-500/10 text-emerald-400' : 'border-slate-700 text-slate-400'}">⏱️ Automático</button>
          <button data-action="setChunkMode" data-val="manual" class="flex-1 py-2 text-xs rounded border transition-colors ${c.chunk_seconds === 0 ? 'border-violet-500 bg-violet-500/10 text-violet-400' : 'border-slate-700 text-slate-400'}">🎯 Manual (tecla)</button>
        </div>
        ${c.chunk_seconds > 0 ? `
          <label class="text-xs text-slate-400 mt-2 block">Chunk: ${c.chunk_seconds}s</label>
          <input type="range" min="30" max="300" step="10" value="${c.chunk_seconds}" data-bind="chunk_seconds"
            class="w-full mt-1 accent-slate-400" />
        ` : `
          <p class="text-xs text-slate-500 mt-2">Pressione <kbd class="bg-slate-700 px-1 rounded">Espaço</kbd> ou <kbd class="bg-slate-700 px-1 rounded">T</kbd> durante a reunião para transcrever</p>
          <div class="mt-2 bg-slate-800 rounded p-3 text-center">
            <p class="text-xs text-slate-400 mb-2">Teste a tecla aqui:</p>
            <div id="keyTestArea" tabindex="0" class="bg-slate-700 rounded p-4 text-sm text-slate-300 cursor-pointer outline-none focus:ring-2 focus:ring-violet-500"
              >Clique aqui e pressione uma tecla...</div>
            <p id="keyTestResult" class="text-xs text-slate-500 mt-1"></p>
          </div>
        `}
      </div>
    </div>

    <!-- Global hotkey -->
    <div class="mb-4">
      <label class="text-xs text-slate-400">Atalho global (funciona fora do app): SUPER + </label>
      <div class="flex gap-2 mt-1 items-center">
        <select data-bind="global_hotkey"
          class="flex-1 bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500">
          <option value="" ${!c.global_hotkey ? 'selected' : ''}>Desativado</option>
          ${['space','F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12'].map(k =>
            `<option value="${k}" ${c.global_hotkey === k ? 'selected' : ''}>SUPER + ${k === 'space' ? 'Espaço' : k}</option>`
          ).join('')}
        </select>
        ${c.global_hotkey ? `<span class="text-xs text-emerald-400">SUPER+${c.global_hotkey === 'space' ? 'Espaço' : c.global_hotkey} para gravar/parar</span>` : ''}
      </div>
    </div>

    <!-- Start -->
    ${!hasDevice ? '<p class="text-xs text-amber-400 mb-2">⚠️ Selecione pelo menos um dispositivo (microfone ou autofalante)</p>' : ''}
    <button data-action="startMeeting" ${!canStart ? 'disabled' : ''}
      class="w-full py-3 rounded font-semibold text-lg transition-colors ${canStart ? 'bg-emerald-600 hover:bg-emerald-500 text-white' : 'bg-slate-700 text-slate-500 cursor-not-allowed'}">
      Iniciar
    </button>
  `;
}

function renderDeviceSelector(type, label, devices, selected, testState) {
  // Auto-select recommended device if nothing selected and not explicitly set to none
  const recommendedDev = devices.find(d => d.recommended);
  const effectiveSelected = selected === 'none' ? 'none' : (selected || (recommendedDev ? recommendedDev.id : ''));
  const level = type === 'mic' ? state.micLevel : state.monitorLevel;
  const hasDevice = effectiveSelected && effectiveSelected !== 'none';
  
  return `
    <div class="mb-4">
      <label class="text-xs text-slate-400">${label}</label>
      <div class="flex gap-2 mt-1">
        <select data-action="selectDevice" data-type="${type}"
          class="flex-1 bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500">
          <option value="">Selecione...</option>
          <option value="none" ${effectiveSelected === 'none' ? 'selected' : ''}>🚫 Não usar</option>
          ${devices.map(d => `<option value="${d.id}" ${d.id === effectiveSelected ? 'selected' : ''} ${d.recommended ? 'data-recommended="true"' : ''}>${d.recommended ? '⭐ ' : ''}${d.name}</option>`).join('')}
        </select>
        <button data-action="testDevice" data-type="${type}" ${!hasDevice ? 'disabled' : ''}
          class="px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm transition-colors ${!hasDevice ? 'opacity-50 cursor-not-allowed' : ''}">
          ${testState === 'testing' ? '⏳ Testando...' : testState === 'ok' ? '✅ OK' : testState === 'fail' ? '❌ Falha' : 'Testar'}
        </button>
      </div>
      ${testState === 'testing' ? `
        <div class="mt-2 bg-slate-800 rounded p-2">
          <div class="flex items-center gap-2 text-xs text-slate-400 mb-1">
            <span>Volume:</span>
            <div class="flex-1 h-2 bg-slate-700 rounded overflow-hidden">
              <div class="h-full ${type === 'mic' ? 'bg-emerald-500' : 'bg-blue-500'} transition-all duration-150" style="width: ${Math.min(level * 500, 100)}%"></div>
            </div>
          </div>
          <p class="text-xs text-slate-500">Fale no microfone ou toque um som no autofalante...</p>
        </div>
      ` : ''}
      ${recommendedDev ? `<p class="text-xs text-slate-500 mt-1">💡 Recomendado: ${recommendedDev.name}</p>` : ''}
      ${testState === 'fail' ? `<p class="text-xs text-red-400 mt-1">⚠️ Nenhum áudio detectado. Verifique o dispositivo e tente novamente.</p>` : ''}
    </div>
  `;
}

// ── MEETING PAGE ──
function renderMeeting() {
  return `
    <!-- Header -->
    <div class="flex items-center justify-between mb-4 bg-slate-800/50 rounded-lg p-3">
      <div class="flex items-center gap-3">
        <span class="w-3 h-3 rounded-full ${state.isRecording ? 'bg-red-500 pulse' : 'bg-slate-600'}"></span>
        <span class="text-sm font-mono">${state.timerDisplay}</span>
      </div>
      <div class="flex gap-4 text-xs text-slate-400">
        ${state.config.mic_device_id && state.config.mic_device_id !== 'none' ? `<span>Mic: <span class="inline-block w-16 h-2 bg-slate-700 rounded overflow-hidden align-middle"><span class="vu-bar block h-full bg-emerald-500 rounded" style="width:${Math.min(state.micLevel * 500, 100)}%"></span></span></span>` : ''}
        ${state.config.monitor_device_id && state.config.monitor_device_id !== 'none' ? `<span>Mon: <span class="inline-block w-16 h-2 bg-slate-700 rounded overflow-hidden align-middle"><span class="vu-bar block h-full bg-blue-500 rounded" style="width:${Math.min(state.monitorLevel * 500, 100)}%"></span></span></span>` : ''}
      </div>
      <button data-action="stopMeeting" class="px-4 py-1.5 bg-red-600 hover:bg-red-500 rounded text-sm font-medium transition-colors">Encerrar</button>
    </div>
    ${state.config.chunk_seconds == 0 ? `
    <div class="flex justify-center mb-3">
      ${state.isProcessing ? `
        <button disabled class="px-6 py-2 rounded text-sm font-medium bg-violet-800 text-violet-400 cursor-wait animate-pulse">
          ⏳ Transcrevendo...
        </button>
      ` : state.isRecording ? `
        <button id="triggerBtn" data-action="stopRecording"
          class="px-6 py-2 rounded text-sm font-medium bg-red-600 hover:bg-red-500 text-white animate-pulse">
          ⏹ Parar e Transcrever (Espaço/T)
        </button>
      ` : `
        <button id="triggerBtn" data-action="startRecording"
          class="px-6 py-2 rounded text-sm font-medium bg-emerald-600 hover:bg-emerald-500 text-white">
          🎙️ Gravar (Espaço/T)
        </button>
      `}
    </div>
    ` : ''}

    <!-- Transcript -->
    <div class="bg-slate-800/30 rounded-lg p-4 mb-4" style="height: 45vh;">
      <h2 class="text-sm font-semibold text-slate-400 mb-2">TRANSCRIÇÃO</h2>
      <div id="transcript-area" class="overflow-y-auto space-y-1" style="height: calc(100% - 2rem);">
        ${state.transcript.length === 0 ? '<p class="text-slate-500 text-sm italic">Aguardando transcrição...</p>' : ''}
        ${state.transcript.map(e => `
          <div class="text-sm fade-in">
            <span class="font-semibold ${e.speaker === state.config.suggestions_target ? 'text-emerald-400' : 'text-blue-400'}">[${e.speaker}]</span>
            <span class="text-slate-300">${e.text}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Suggestions -->
    <div class="bg-slate-800/30 rounded-lg p-4" style="height: 35vh;">
      <h2 class="text-sm font-semibold text-slate-400 mb-2">SUGESTÕES DO COPILOTO</h2>
      <div id="suggestions-area" class="overflow-y-auto space-y-2" style="height: calc(100% - 2rem);">
        ${state.suggestions.length === 0 ? '<p class="text-slate-500 text-sm italic">Aguardando sugestões...</p>' : ''}
        ${state.suggestions.map(s => `
          <div class="text-sm fade-in mb-2">
            <span class="text-amber-400">→</span> <span class="text-slate-300">${s}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ── SUMMARY PAGE ──
function renderSummary() {
  return `
    <h1 class="text-2xl font-bold mb-4">Resumo da Reunião</h1>
    ${state.summaryLoading ? `
      <div class="flex items-center gap-2 text-slate-400 mb-4">
        <span class="pulse">⏳</span> Gerando resumo...
      </div>
    ` : `
      <div class="bg-slate-800/30 rounded-lg p-6 mb-4 markdown-body" id="summary-content">
        ${marked.parse(state.summary || 'Nenhum resumo disponível.')}
      </div>
    `}
    <div class="flex gap-3">
      <button data-action="copySummary" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm transition-colors">📋 Copiar</button>
      <button data-action="newMeeting" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded text-sm font-medium transition-colors">Nova Reunião</button>
    </div>
  `;
}

// ── Event binding ──
function bindEvents() {
  // Key test area
  const keyTest = document.getElementById('keyTestArea');
  if (keyTest) {
    keyTest.addEventListener('keydown', (e) => {
      e.preventDefault();
      const result = document.getElementById('keyTestResult');
      const isValid = e.key === ' ' || e.key === 't' || e.key === 'T';
      keyTest.textContent = `Tecla: "${e.key === ' ' ? 'Espaço' : e.key}" (code: ${e.code})`;
      if (result) {
        result.textContent = isValid ? '✅ Tecla reconhecida! Vai funcionar na reunião.' : `⚠️ Use Espaço ou T`;
        result.className = `text-xs mt-1 ${isValid ? 'text-emerald-400' : 'text-amber-400'}`;
      }
    });
  }

  // Data bindings
  document.querySelectorAll('[data-bind]').forEach(el => {
    const evt = (el.tagName === 'TEXTAREA' || el.tagName === 'SELECT') ? 'change' : 'input';
    el.addEventListener(evt, () => {
      const key = el.dataset.bind;
      const val = el.type === 'range' ? Number(el.value) : el.value;
      console.log(`[BIND] ${key} = ${val} (tag=${el.tagName}, evt=${evt})`);
      state.config[key] = val;
      if (el.tagName !== 'TEXTAREA') render();
    });
  });

  // Actions
  document.querySelectorAll('[data-action]').forEach(el => {
    const action = el.dataset.action;
    const handler = el.tagName === 'SELECT' || el.type === 'file' ? 'change' : 'click';

    if (action === 'updateParticipant') {
      el.addEventListener('input', () => {
        const i = parseInt(el.dataset.idx);
        state.config.participants[i][el.dataset.field] = el.value;
      });
      return;
    }

    el.addEventListener(handler, async () => {
      switch (action) {
        case 'setTab':
          state.tab = el.dataset.val;
          render();
          break;
        case 'setProvider':
          state.config.transcription_provider = el.dataset.val;
          render();
          break;
        case 'setDiar':
          state.config.diarization_provider = el.dataset.val;
          render();
          break;
        case 'selectDevice':
          console.log(`[SELECT DEVICE] type=${el.dataset.type}, value="${el.value}"`);
          if (el.dataset.type === 'mic') {
            state.config.mic_device_id = el.value;
            state.micTest = 'idle';
          } else {
            state.config.monitor_device_id = el.value;
            state.monitorTest = 'idle';
          }
          render();
          break;
        case 'testDevice': {
          const type = el.dataset.type;
          const devId = type === 'mic' ? state.config.mic_device_id : state.config.monitor_device_id;
          if (type === 'mic') state.micTest = 'testing'; else state.monitorTest = 'testing';
          
          // Track audio levels during test
          let testLevels = [];
          const testLevelHandler = (e) => {
            if (e.detail.deviceId === devId) {
              testLevels.push(e.detail.level);
              // Update visual feedback during test
              if (type === 'mic') state.micLevel = e.detail.level;
              else state.monitorLevel = e.detail.level;
              // Update VU meter in real-time
              const selector = type === 'mic' ? '[data-type="mic"] + button' : '[data-type="monitor"] + button';
              const btn = document.querySelector(selector);
              if (btn) {
                const pct = Math.min(e.detail.level * 500, 100);
                btn.style.background = `linear-gradient(to right, ${type === 'mic' ? '#10b981' : '#3b82f6'} ${pct}%, #334155 ${pct}%)`;
              }
            }
          };
          window.addEventListener('backend:test_level', testLevelHandler);
          
          render();
          try {
            const level = await callApi('test_device', devId, type === 'mic' ? 'input' : 'monitor');
            window.removeEventListener('backend:test_level', testLevelHandler);
            
            // Check if we got consistent audio - different thresholds for mic vs monitor
            const significantLevels = testLevels.filter(l => l > (type === 'mic' ? 0.003 : 0.01));
            const hasAudio = significantLevels.length >= (type === 'mic' ? 8 : 5);
            
            if (type === 'mic') {
              state.micTest = hasAudio ? 'ok' : 'fail';
              state.micLevel = 0;
            } else {
              state.monitorTest = hasAudio ? 'ok' : 'fail';
              state.monitorLevel = 0;
            }
          } catch (e) { 
            window.removeEventListener('backend:test_level', testLevelHandler);
            if (type === 'mic') { state.micTest = 'fail'; state.micLevel = 0; }
            else { state.monitorTest = 'fail'; state.monitorLevel = 0; }
          }
          render();
          break;
        }
        case 'validateAws':
          state.awsValid = 'testing'; state.awsInfo = ''; render();
          try {
            const info = await callApi('validate_aws', state.config.aws_profile, state.config.aws_region);
            state.awsValid = 'ok'; state.awsInfo = info || 'OK';
          } catch (e) { state.awsValid = 'fail'; state.awsInfo = String(e); }
          render();
          break;
        case 'addParticipant':
          state.config.participants.push({ name: '', role: '' });
          render();
          break;
        case 'removeParticipant':
          state.config.participants.splice(parseInt(el.dataset.idx), 1);
          render();
          break;
        case 'selectTemplate': {
          const tpl = el.value;
          if (tpl === 'custom') {
            document.getElementById('promptFileInput')?.click();
          } else if (tpl) {
            const content = await callApi('load_prompt_template', tpl);
            if (content) {
              state.config.custom_system_prompt = content;
              render();
            }
          }
          break;
        }
        case 'loadPromptFile':
          if (el.files && el.files[0]) {
            const reader = new FileReader();
            reader.onload = (ev) => {
              state.config.custom_system_prompt = ev.target.result;
              render();
            };
            reader.readAsText(el.files[0]);
          }
          break;
        case 'startMeeting':
          await callApi('save_config', state.config);
          await callApi('start_meeting', state.config);
          state.page = 'meeting';
          state.transcript = [];
          state.suggestions = [];
          state.timerStart = Date.now();
          startTimer();
          render();
          break;
        case 'setChunkMode':
          state.config.chunk_seconds = el.dataset.val === 'manual' ? 0 : 60;
          render();
          break;
        case 'startRecording':
        case 'stopRecording':
          await callApi('toggle_recording');
          break;
        case 'triggerTranscription':
          if (!state.isProcessing) {
            state.isProcessing = true;
            const btn = document.getElementById('triggerBtn');
            if (btn) { btn.disabled = true; btn.className = 'px-6 py-2 rounded text-sm font-medium bg-violet-800 text-violet-400 cursor-wait animate-pulse'; btn.innerHTML = '⏳ Processando...'; }
            // Add loading indicators
            const tArea = document.getElementById('transcript-area');
            if (tArea) {
              const ld = document.createElement('div');
              ld.className = 'loading-indicator text-sm text-violet-400 animate-pulse';
              ld.textContent = '⏳ Transcrevendo e analisando...';
              tArea.appendChild(ld);
              tArea.scrollTop = tArea.scrollHeight;
            }
            await callApi('trigger_transcription');
          }
          break;
        case 'stopMeeting':
          stopTimer();
          const result = await callApi('stop_meeting');
          state.summary = result?.summary || '';
          state.summaryLoading = false;
          state.page = 'summary';
          render();
          break;
        case 'copySummary':
          navigator.clipboard.writeText(state.summary);
          break;
        case 'newMeeting':
          state.page = 'setup';
          state.transcript = [];
          state.suggestions = [];
          state.summary = '';
          render();
          break;
      }
    });
  });
}

// ── Timer ──
function startTimer() {
  timerInterval = setInterval(() => {
    if (!state.timerStart) return;
    const elapsed = Math.floor((Date.now() - state.timerStart) / 1000);
    const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
    const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    state.timerDisplay = `${h}:${m}:${s}`;
    // Update timer display without full re-render
    const timerEl = document.querySelector('.font-mono');
    if (timerEl) timerEl.textContent = state.timerDisplay;
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ── Backend events ──
window.addEventListener('backend:transcript', (e) => {
  state.transcript.push(e.detail);
  if (state.page === 'meeting') {
    const area = document.getElementById('transcript-area');
    if (area) {
      const loading = area.querySelector('.loading-indicator');
      if (loading) loading.remove();
      
      const entry = e.detail;
      const isTarget = entry.speaker === state.config.suggestions_target;
      const div = document.createElement('div');
      div.className = 'text-sm fade-in';
      const speakerSpan = `<span class="font-semibold ${isTarget ? 'text-emerald-400' : 'text-blue-400'}">[${entry.speaker}]</span> `;
      div.innerHTML = speakerSpan + '<span class="text-slate-300 typewriter"></span>';
      area.appendChild(div);
      // Typewriter effect
      const tw = div.querySelector('.typewriter');
      let i = 0;
      const text = entry.text;
      const interval = setInterval(() => {
        if (i < text.length) {
          tw.textContent += text.charAt(i);
          i += Math.min(3, text.length - i); // 3 chars at a time for speed
          area.scrollTop = area.scrollHeight;
        } else {
          tw.textContent = text;
          clearInterval(interval);
        }
      }, 8);
    }
  }
});

window.addEventListener('backend:suggestions', (e) => {
  const data = e.detail;
  if (data.suggestions) {
    state.suggestions.push(...data.suggestions);
    if (data.roles) Object.assign(state.roles, data.roles);
    
    // Reset processing state
    state.isProcessing = false;
    render();
    
    if (state.page === 'meeting') {
      const area = document.getElementById('suggestions-area');
      if (area) {
        const placeholder = area.querySelector('.italic');
        if (placeholder) placeholder.remove();
        
        // Fade old suggestions
        area.querySelectorAll('.suggestion-item').forEach(el => {
          el.classList.add('opacity-30');
          el.classList.remove('opacity-100');
        });
        
        // Add new suggestions with highlight
        for (const s of data.suggestions) {
          const div = document.createElement('div');
          div.className = 'suggestion-item text-sm fade-in mb-2 opacity-100 transition-opacity duration-500';
          div.innerHTML = `<span class="text-amber-400">→</span> <span class="text-slate-100 font-medium">${s}</span>`;
          area.appendChild(div);
        }
        area.scrollTop = area.scrollHeight;
      }
    }
  }
});

window.addEventListener('backend:processing_done', (e) => {
  state.isProcessing = false;
  render();

  if (!e.detail.had_suggestions && state.page === 'meeting') {
    const area = document.getElementById('suggestions-area');
    if (area) {
      const div = document.createElement('div');
      div.className = 'text-sm text-slate-500 italic fade-in mb-2';
      div.textContent = '— IA não gerou sugestões neste trecho —';
      area.appendChild(div);
      area.scrollTop = area.scrollHeight;
    }
  }
});

window.addEventListener('backend:recording_done', (e) => {
  state.isProcessing = false;
  state.isRecording = false;
  render();
});

window.addEventListener('backend:recording_state', (e) => {
  state.isRecording = e.detail.recording;
  if (!e.detail.recording) state.isProcessing = true;
  render();
});

window.addEventListener('backend:speaker_map', (e) => {
  const map = e.detail;
  state.transcript = state.transcript.map(entry => {
    const resolved = map[entry.speaker];
    return resolved ? { ...entry, speaker: resolved } : entry;
  });
  if (state.page === 'meeting') render();
});

window.addEventListener('backend:audio_level', (e) => {
  const { source, deviceId, level } = e.detail;
  const src = source || (deviceId?.includes('monitor') || deviceId?.includes('.monitor') ? 'monitor' : 'mic');
  if (src === 'mic') state.micLevel = level;
  else state.monitorLevel = level;
  // Update VU meters without full re-render
  if (state.page === 'meeting') {
    const bars = document.querySelectorAll('.vu-bar');
    if (bars[0] && src === 'mic') bars[0].style.width = Math.min(level * 500, 100) + '%';
    if (bars[1] && src === 'monitor') bars[1].style.width = Math.min(level * 500, 100) + '%';
  }
  // Update test VU meters on setup page
  if (state.page === 'setup' && (state.micTest === 'testing' || state.monitorTest === 'testing')) {
    render();
  }
});

window.addEventListener('backend:test_level', (e) => {
  const { deviceId, level } = e.detail;
  // Update level for the device being tested
  const isMic = !deviceId.includes('monitor') && !deviceId.includes('loopback');
  if (isMic) state.micLevel = level;
  else state.monitorLevel = level;
  
  // Update test VU meter in real-time
  if (state.page === 'setup' && (state.micTest === 'testing' || state.monitorTest === 'testing')) {
    render();
  }
});

window.addEventListener('backend:error', (e) => {
  console.error('Backend error:', e.detail);
  // Show toast
  const toast = document.createElement('div');
  toast.className = 'fixed top-4 right-4 bg-red-900/90 border border-red-700 text-red-200 px-4 py-2 rounded-lg text-sm z-50 fade-in';
  toast.textContent = e.detail.message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 5000);
});

// Keyboard shortcut
window.addEventListener('keydown', (e) => {
  if (state.page !== 'meeting') return;
  if (e.ctrlKey && e.shiftKey && e.key === 'S') {
    e.preventDefault();
    document.querySelector('[data-action="stopMeeting"]')?.click();
  }
  // Space/T = toggle recording in manual mode
  if ((e.key === ' ' || e.key === 't' || e.key === 'T') && state.page === 'meeting' && state.config.chunk_seconds == 0 && !state.isProcessing && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault();
    if (state.isRecording) {
      document.querySelector('[data-action="stopRecording"]')?.click();
    } else {
      document.querySelector('[data-action="startRecording"]')?.click();
    }
  }
});

// ── Init ──
window.addEventListener('pywebviewready', async () => {
  // Load saved config
  try {
    const saved = await callApi('load_config');
    if (saved) Object.assign(state.config, saved);
  } catch {}

  // Load devices
  try {
    state.devices = await callApi('list_audio_devices') || [];
  } catch {}

  // Auto-select recommended device if none selected
  const inputDevs = state.devices.filter(d => d.deviceType === 'input');
  const monitorDevs = state.devices.filter(d => d.deviceType === 'output' || d.deviceType === 'monitor');
  
  const recommendedInput = inputDevs.find(d => d.recommended);
  if (recommendedInput && !state.config.mic_device_id) {
    state.config.mic_device_id = recommendedInput.id;
  }
  
  const recommendedMonitor = monitorDevs.find(d => d.recommended);
  if (recommendedMonitor && !state.config.monitor_device_id) {
    state.config.monitor_device_id = recommendedMonitor.id;
  }

  render();
});

// Fallback if pywebviewready doesn't fire
setTimeout(() => { if (!state.devices.length) render(); }, 1000);
</script>
