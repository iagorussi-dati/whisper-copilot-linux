<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whisper Copilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
    select { color: #f1f5f9 !important; background-color: #1e293b !important; -webkit-appearance: none; }
    select option { color: #f1f5f9; background-color: #1e293b; }
    .vu-bar { transition: width 150ms ease; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse { animation: pulse 1.5s infinite; }
    #transcript-area { scroll-behavior: smooth; }
    .markdown-body h2 { font-size: 1.25rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #f1f5f9; }
    .markdown-body p { margin-bottom: 0.5rem; }
    .markdown-body ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 0.5rem; }
    .markdown-body li { margin-bottom: 0.25rem; }
  </style>
</head>
<body class="min-h-screen">

<!-- Event bus -->
<script>
  window.__emit = function(event, data) {
    window.dispatchEvent(new CustomEvent('backend:' + event, { detail: data }));
  };
</script>

<div id="app" class="max-w-3xl mx-auto p-4"></div>

<script>
// ── State ──
const state = {
  page: 'setup', // setup | meeting | summary
  config: {
    transcription_provider: 'groq', diarization_provider: 'local',
    groq_api_key: '', aws_profile: 'poc_iago', aws_region: 'us-east-1',
    bedrock_model_id: 'us.anthropic.claude-sonnet-4-20250514-v1:0',
    whisper_model: 'whisper-large-v3-turbo', language: 'pt',
    chunk_seconds: 60, diarization_threshold: 0.25,
    mic_device_id: '', monitor_device_id: '', my_name: '', participants: [],
    suggestions_target: '', custom_system_prompt: '', global_hotkey: '',
    response_mode: 'short', auto_response: true, extra_context: '',
    participant_mode: 'named', many_context: '',
    user_identity: '',
  },
  devices: [],
  micTest: 'idle', monitorTest: 'idle', awsValid: 'idle', awsInfo: '',
  tab: 'admin',
  // Meeting
  transcript: [],
  suggestions: [],
  roles: {},
  isAnalyzing: false,
  isProcessing: false,
  isRecording: false,
  showChat: false, // unused, kept for compat
  timerStart: null, timerDisplay: '00:00:00',
  micLevel: 0, monitorLevel: 0,
  // Summary
  summary: '', summaryLoading: false,
};

let timerInterval = null;

// ── API helpers ──
const api = () => window.pywebview?.api;

async function callApi(method, ...args) {
  const a = api();
  if (!a) { console.warn('API not ready'); return null; }
  try { return await a[method](...args); }
  catch (e) { console.error(`API ${method} error:`, e); throw e; }
}

// ── Render ──
let _rendering = false;
let _renderCount = 0;
function render() {
  if (_rendering) { console.warn('RENDER BLOCKED (recursive)'); return; }
  _rendering = true;
  _renderCount++;
  const n = _renderCount;
  console.log(`[RENDER #${n}] page=${state.page}, mic=${state.config.mic_device_id}, mon=${state.config.monitor_device_id}`);
  if (n > 50) { console.error('RENDER LOOP DETECTED, stopping'); _rendering = false; return; }
  try {
    const app = document.getElementById('app');
    if (state.page === 'setup') app.innerHTML = renderSetup();
    else if (state.page === 'meeting') app.innerHTML = renderMeeting();
    else if (state.page === 'summary') app.innerHTML = renderSummary();
    bindEvents();
  } catch(e) {
    console.error('[RENDER ERROR]', e);
  }
  _rendering = false;
  console.log(`[RENDER #${n}] done`);
}

// ── SETUP PAGE ──
function renderSetup() {
  const c = state.config;
  const inputDevs = state.devices.filter(d => d.deviceType === 'input');
  const monitorDevs = state.devices.filter(d => d.deviceType === 'output' || d.deviceType === 'monitor');
  const hasDevice = (c.mic_device_id && c.mic_device_id !== 'none') || (c.monitor_device_id && c.monitor_device_id !== 'none');
  const canStart = hasDevice && state.awsValid === 'ok' && c.custom_system_prompt;

  return `
    <h1 class="text-2xl font-bold text-center mb-6">Whisper Copilot</h1>
    <p class="text-xs text-slate-500 mb-4">Copiloto de reuniões em tempo real.</p>

    <!-- Audio devices -->
    <h2 class="text-lg font-semibold mb-2">Dispositivos de Áudio</h2>
    ${renderDeviceSelector('mic', '🎙️ Microfone', inputDevs, c.mic_device_id, state.micTest)}
    ${renderDeviceSelector('monitor', '🔊 Autofalante', monitorDevs, c.monitor_device_id, state.monitorTest)}

    <!-- AWS -->
    <h2 class="text-lg font-semibold mb-2">Sugestões IA (Bedrock)</h2>
    <div class="flex gap-2 items-center mb-2">
      <button data-action="validateAws" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm transition-colors">Validar AWS</button>
      ${state.awsValid !== 'idle' ? `<span class="text-sm">${state.awsValid === 'testing' ? '⏳' : state.awsValid === 'ok' ? '✅' : '❌'}</span>` : ''}
      ${state.awsInfo ? `<span class="text-xs text-slate-400">${state.awsInfo}</span>` : ''}
    </div>

    <!-- Identificação de participantes -->
    <h2 class="text-lg font-semibold mt-4 mb-2">Participantes</h2>
    <div class="flex gap-2 mb-3">
      <button data-action="setParticipantMode" data-val="named" class="flex-1 py-2 text-xs rounded border transition-colors ${c.participant_mode === 'named' ? 'border-violet-500 bg-violet-500/10 text-violet-400' : 'border-slate-700 text-slate-400 hover:border-slate-500'}">
        👥 Pessoas específicas
      </button>
      <button data-action="setParticipantMode" data-val="many" class="flex-1 py-2 text-xs rounded border transition-colors ${c.participant_mode === 'many' ? 'border-violet-500 bg-violet-500/10 text-violet-400' : 'border-slate-700 text-slate-400 hover:border-slate-500'}">
        🌐 Muitas pessoas
      </button>
      <button data-action="setParticipantMode" data-val="none" class="flex-1 py-2 text-xs rounded border transition-colors ${c.participant_mode === 'none' ? 'border-violet-500 bg-violet-500/10 text-violet-400' : 'border-slate-700 text-slate-400 hover:border-slate-500'}">
        🤖 Automático
      </button>
    </div>

    ${c.participant_mode === 'named' ? `
      <p class="text-xs text-slate-500 mb-2">Adicione quem vai falar. A IA identifica melhor com nome + papel.</p>
      <div class="space-y-2 mb-3">
        ${c.participants.map((p, i) => `
          <div class="flex gap-2 items-center bg-slate-800/50 rounded-lg p-2 ${c.suggestions_target === p.name && p.name ? 'ring-1 ring-emerald-500/50' : ''}">
            <button data-action="setTarget" data-idx="${i}" title="Direcionar copiloto"
              class="w-8 h-8 rounded-full flex items-center justify-center text-sm transition-all ${c.suggestions_target === p.name && p.name ? 'bg-emerald-600 text-white' : 'bg-slate-700 text-slate-500 hover:bg-slate-600'}">
              ${c.suggestions_target === p.name && p.name ? '🎯' : '👤'}
            </button>
            <input type="text" data-action="updateParticipant" data-idx="${i}" data-field="name" value="${p.name}" placeholder="Nome"
              class="flex-1 bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500" />
            <input type="text" data-action="updateParticipant" data-idx="${i}" data-field="role" value="${p.role}" placeholder="Papel (ex: dev, gestor)"
              class="flex-1 bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500" />
            <button data-action="removeParticipant" data-idx="${i}" class="text-slate-500 hover:text-red-400 text-lg px-1 transition-colors">×</button>
          </div>
        `).join('')}
      </div>
      <button data-action="addParticipant" class="text-xs text-slate-400 hover:text-emerald-400 transition-colors">+ Adicionar pessoa</button>
    ` : c.participant_mode === 'many' ? `
      <p class="text-xs text-slate-500 mb-2">A IA identifica automaticamente pelos nomes mencionados na conversa.</p>
      <textarea data-bind="many_context" rows="2" placeholder="Contexto (opcional): Ex: Daily standup de equipe de desenvolvimento..."
        class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500 resize-y">${c.many_context || ''}</textarea>
    ` : `
      <p class="text-xs text-slate-500 mb-2">O copiloto vai te ajudar diretamente. Diga quem você é pra ele te conhecer.</p>
      <textarea data-bind="user_identity" rows="2" placeholder="Ex: Sou o Leo, estagiário de DevOps. Estou aprendendo sobre AWS e quero entender o que está sendo discutido."
        class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500 resize-y">${c.user_identity || ''}</textarea>
    `}
    ${c.suggestions_target ? `<p class="text-xs text-emerald-400 mt-2">🎯 Copiloto focado em: ${c.suggestions_target}</p>` : ''}

    <!-- Template do Copiloto -->
    <h2 class="text-lg font-semibold mt-4 mb-2">Template</h2>
    <p class="text-xs text-slate-500 mb-2">Define como o copiloto se comporta. Obrigatório.</p>
    <div class="flex gap-2 mb-2">
      <select data-action="selectTemplate"
        class="flex-1 bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500">
        <option value="">Selecione um template...</option>
        <optgroup label="Uso geral">
          <option value="conversa">💬 Conversa Natural (tipo GPT)</option>
          <option value="sugestoes">📋 Sugestões (ações com emojis)</option>
          <option value="assistente">⚡ Assistente Objetivo (máx 3 frases)</option>
          <option value="pesquisa">🔍 Pesquisa (análise profunda)</option>
        </optgroup>
        <optgroup label="Específicos">
          <option value="discovery">📋 Discovery Comercial (Dati)</option>
          <option value="tecnico">🔧 Consultor Técnico AWS</option>
          <option value="vendas">💰 Copiloto de Vendas</option>
          <option value="piadas">🎭 Piadas e Humor</option>
        </optgroup>
        <option value="custom">📄 Carregar arquivo...</option>
      </select>
    </div>
    <input type="file" data-action="loadPromptFile" accept=".md,.txt,.markdown"
      class="text-xs text-slate-400 mb-2" style="display:none" id="promptFileInput" />
    <textarea data-bind="custom_system_prompt" rows="3" placeholder="Selecione um template acima ou escreva seu próprio..."
      class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500 resize-y text-xs">${c.custom_system_prompt}</textarea>
    ${c.custom_system_prompt ? `<p class="text-xs text-emerald-400 mt-1">✅ Template carregado</p>` : '<p class="text-xs text-amber-400 mt-1">⚠️ Selecione um template</p>'}

    <!-- Instruções adicionais -->
    <h2 class="text-lg font-semibold mt-4 mb-2">Instruções adicionais</h2>
    <p class="text-xs text-slate-500 mb-2">Contexto extra que o copiloto deve considerar. Opcional.</p>
    <textarea data-bind="extra_context" rows="2" placeholder="Ex: Estamos discutindo migração pra AWS. Foco em custos e prazos. O cliente é conservador..."
      class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500 resize-y">${c.extra_context || ''}</textarea>

    <!-- Settings -->
    <h2 class="text-lg font-semibold mt-4 mb-2">Configurações</h2>

    <!-- Auto vs instruction -->
    <label class="text-xs text-slate-400">Modo do copiloto</label>
    <div class="flex gap-2 mt-1 mb-4">
      <button data-action="setAutoResponse" data-val="true" class="flex-1 py-2 px-2 rounded border transition-colors ${c.auto_response ? 'border-emerald-500 bg-emerald-500/10 text-emerald-400' : 'border-slate-700 text-slate-400 hover:border-slate-500'}">
        <div class="text-xs font-medium">🤖 Automático</div>
        <div class="text-xs text-slate-500">Responde sozinho ao parar</div>
      </button>
      <button data-action="setAutoResponse" data-val="false" class="flex-1 py-2 px-2 rounded border transition-colors ${!c.auto_response ? 'border-violet-500 bg-violet-500/10 text-violet-400' : 'border-slate-700 text-slate-400 hover:border-slate-500'}">
        <div class="text-xs font-medium">💬 Com instrução</div>
        <div class="text-xs text-slate-500">Espera você digitar</div>
      </button>
    </div>

    <!-- Response mode -->
    <label class="text-xs text-slate-400">Tipo de resposta</label>
    <div class="flex gap-2 mt-1 mb-4">
      ${[
        {id:'short', label:'⚡ Curta', desc:'~2s', detail:'Até 3 respostas rápidas'},
        {id:'full', label:'📋 Completa', desc:'~5s', detail:'Até 10 respostas'},
        {id:'research', label:'🔍 Pesquisa', desc:'~10s', detail:'Análise profunda'}
      ].map(m => `
        <button data-action="setResponseMode" data-val="${m.id}" class="flex-1 py-2 px-2 rounded border transition-colors ${c.response_mode === m.id ? 'border-violet-500 bg-violet-500/10 text-violet-400' : 'border-slate-700 text-slate-400 hover:border-slate-500'}">
          <div class="text-xs font-medium">${m.label}</div>
          <div class="text-xs text-slate-500">${m.desc} — ${m.detail}</div>
        </button>
      `).join('')}
    </div>

    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="text-xs text-slate-400">Idioma</label>
        <input type="text" data-bind="language" value="${c.language}"
          class="w-full mt-1 bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500" />
      </div>
      <div>
        <label class="text-xs text-slate-400">Transcrição a cada</label>
        <input type="range" min="60" max="300" step="10" value="${c.chunk_seconds}" data-bind="chunk_seconds"
          class="w-full mt-1 accent-slate-400" />
        <span class="text-xs text-slate-500">${c.chunk_seconds}s (mín. 60s)</span>
      </div>
    </div>

    <!-- Global hotkey -->
    <div class="mb-4">
      <label class="text-xs text-slate-400">Atalho global (funciona fora do app)</label>
      <div class="flex gap-2 mt-1 items-center">
        <select data-bind="global_hotkey"
          class="flex-1 bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500">
          <option value="" ${!c.global_hotkey ? 'selected' : ''}>Desativado</option>
          ${['space','F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12'].map(k =>
            `<option value="${k}" ${c.global_hotkey === k ? 'selected' : ''}>SUPER + ${k === 'space' ? 'Espaço' : k}</option>`
          ).join('')}
        </select>
        ${c.global_hotkey ? `<span class="text-xs text-emerald-400">SUPER+${c.global_hotkey === 'space' ? 'Espaço' : c.global_hotkey}</span>` : ''}
      </div>
    </div>

    <!-- Start -->
    ${!hasDevice ? '<p class="text-xs text-amber-400 mb-2">⚠️ Selecione pelo menos um dispositivo (microfone ou autofalante)</p>' : ''}
    ${!c.custom_system_prompt ? '<p class="text-xs text-amber-400 mb-2">⚠️ Selecione um template de System Prompt</p>' : ''}
    <button data-action="startMeeting" ${!canStart ? 'disabled' : ''}
      class="w-full py-3 rounded font-semibold text-lg transition-colors ${canStart ? 'bg-emerald-600 hover:bg-emerald-500 text-white' : 'bg-slate-700 text-slate-500 cursor-not-allowed'}">
      Iniciar
    </button>
  `;
}

function renderDeviceSelector(type, label, devices, selected, testState) {
  // Auto-select recommended device if nothing selected and not explicitly set to none
  const recommendedDev = devices.find(d => d.recommended);
  const effectiveSelected = selected === 'none' ? 'none' : (selected || (recommendedDev ? recommendedDev.id : ''));
  const level = type === 'mic' ? state.micLevel : state.monitorLevel;
  const hasDevice = effectiveSelected && effectiveSelected !== 'none';
  
  return `
    <div class="mb-4">
      <label class="text-xs text-slate-400">${label}</label>
      <div class="flex gap-2 mt-1">
        <select data-action="selectDevice" data-type="${type}"
          class="flex-1 bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500">
          <option value="">Selecione...</option>
          <option value="none" ${effectiveSelected === 'none' ? 'selected' : ''}>🚫 Não usar</option>
          ${devices.map(d => `<option value="${d.id}" ${d.id === effectiveSelected ? 'selected' : ''} ${d.recommended ? 'data-recommended="true"' : ''}>${d.recommended ? '⭐ ' : ''}${d.name}</option>`).join('')}
        </select>
        <button data-action="testDevice" data-type="${type}" ${!hasDevice ? 'disabled' : ''}
          class="px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm transition-colors ${!hasDevice ? 'opacity-50 cursor-not-allowed' : ''}">
          ${testState === 'testing' ? '⏳ Testando...' : testState === 'ok' ? '✅ OK' : testState === 'fail' ? '❌ Falha' : 'Testar'}
        </button>
      </div>
      ${testState === 'testing' ? `
        <div class="mt-2 bg-slate-800 rounded p-2">
          <div class="flex items-center gap-2 text-xs text-slate-400 mb-1">
            <span>Volume:</span>
            <div class="flex-1 h-2 bg-slate-700 rounded overflow-hidden">
              <div id="vu-${type}" class="h-full ${type === 'mic' ? 'bg-emerald-500' : 'bg-blue-500'} transition-all duration-150" style="width: ${Math.min(level * 500, 100)}%"></div>
            </div>
          </div>
          <p class="text-xs text-slate-500">Fale no microfone ou toque um som no autofalante...</p>
        </div>
      ` : ''}
      ${recommendedDev ? `<p class="text-xs text-slate-500 mt-1">💡 Recomendado: ${recommendedDev.name}</p>` : ''}
      ${testState === 'fail' ? `<p class="text-xs text-red-400 mt-1">⚠️ Nenhum áudio detectado. Verifique o dispositivo e tente novamente.</p>` : ''}
    </div>
  `;
}

// ── MEETING PAGE ──
function renderMeeting() {
  return `
    <!-- Header -->
    <div class="flex items-center justify-between mb-4 bg-slate-800/50 rounded-lg p-3">
      <div class="flex items-center gap-3">
        <span class="w-3 h-3 rounded-full ${state.isRecording ? 'bg-red-500 pulse' : 'bg-slate-600'}"></span>
        <span class="text-sm font-mono">${state.timerDisplay}</span>
        <span class="text-xs text-slate-500">${state.isRecording ? 'Gravando' : 'Parado'} | ${state.transcript.length} entradas</span>
      </div>
      <div class="flex gap-4 text-xs text-slate-400">
        ${state.config.mic_device_id && state.config.mic_device_id !== 'none' ? `<span>Mic: <span class="inline-block w-16 h-2 bg-slate-700 rounded overflow-hidden align-middle"><span class="vu-bar block h-full bg-emerald-500 rounded" style="width:${Math.min(state.micLevel * 500, 100)}%"></span></span></span>` : ''}
        ${state.config.monitor_device_id && state.config.monitor_device_id !== 'none' ? `<span>Mon: <span class="inline-block w-16 h-2 bg-slate-700 rounded overflow-hidden align-middle"><span class="vu-bar block h-full bg-blue-500 rounded" style="width:${Math.min(state.monitorLevel * 500, 100)}%"></span></span></span>` : ''}
      </div>
      <button data-action="stopMeeting" class="px-4 py-1.5 bg-red-600 hover:bg-red-500 rounded text-sm font-medium transition-colors">Encerrar</button>
    </div>

    <!-- Controls -->
    <div class="flex justify-center mb-3">
      ${state.isProcessing ? `
        <button disabled class="px-6 py-2 rounded text-sm font-medium bg-violet-800 text-violet-400 cursor-wait animate-pulse">
          ⏳ Processando...
        </button>
      ` : state.isRecording ? `
        <button data-action="toggleRec" class="px-6 py-2 rounded text-sm font-medium bg-red-600 hover:bg-red-500 text-white animate-pulse">
          ⏹ Parar Gravação (Espaço)
        </button>
      ` : `
        <button data-action="toggleRec" class="px-6 py-2 rounded text-sm font-medium bg-emerald-600 hover:bg-emerald-500 text-white">
          🎙️ Gravar (Espaço)
        </button>
      `}
    </div>

    <!-- Admin Log: Transcript -->
    <div class="bg-slate-800/30 rounded-lg p-4 mb-4" style="height: 50vh;">
      <h2 class="text-sm font-semibold text-slate-500 mb-2">LOG — TRANSCRIÇÃO</h2>
      <div id="transcript-area" class="overflow-y-auto space-y-1 font-mono text-xs" style="height: calc(100% - 2rem);">
        ${state.transcript.length === 0 ? '<p class="text-slate-600 italic">Aguardando...</p>' : ''}
        ${state.transcript.map(e => `
          <div class="fade-in">
            <span class="${e.speaker === state.config.suggestions_target ? 'text-emerald-400' : 'text-blue-400'}">[${e.speaker}]</span>
            <span class="text-slate-400">${e.text}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Admin Log: Copilot responses -->
    <div class="bg-slate-800/30 rounded-lg p-4" style="height: 25vh;">
      <h2 class="text-sm font-semibold text-slate-500 mb-2">LOG — COPILOTO</h2>
      <div id="suggestions-area" class="overflow-y-auto space-y-1 font-mono text-xs" style="height: calc(100% - 2rem);">
        ${state.suggestions.length === 0 ? '<p class="text-slate-600 italic">Aguardando...</p>' : ''}
        ${state.suggestions.map(s => `
          <div class="fade-in text-slate-400">${s}</div>
        `).join('')}
      </div>
    </div>
  `;
}

// ── SUMMARY PAGE ──
function renderSummary() {
  return `
    <h1 class="text-2xl font-bold mb-4">Finalizar Reunião</h1>
    <p class="text-sm text-slate-400 mb-4">Transcrição: ${state.transcript.length} entradas. O que deseja fazer com a reunião?</p>
    
    <div class="mb-4">
      <textarea id="reportInstruction" rows="3" placeholder="Ex: Gere um resumo executivo, liste os action items, faça uma ata..."
        class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 outline-none focus:border-slate-500 resize-y"></textarea>
    </div>
    
    <button data-action="generateReport" class="w-full py-2 bg-violet-600 hover:bg-violet-500 rounded text-sm font-medium transition-colors mb-4">
      ${state.summaryLoading ? '⏳ Gerando...' : '📄 Gerar Relatório'}
    </button>

    ${state.summary ? `
      <div class="bg-slate-800/30 rounded-lg p-6 mb-4 markdown-body" id="summary-content">
        ${marked.parse(state.summary)}
      </div>
      <div class="flex gap-3 mb-4">
        <button data-action="copySummary" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm transition-colors">📋 Copiar</button>
        <button data-action="saveSummary" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm transition-colors">💾 Salvar .md</button>
      </div>
    ` : ''}

    <button data-action="newMeeting" class="w-full py-2 bg-emerald-600 hover:bg-emerald-500 rounded text-sm font-medium transition-colors">Nova Reunião</button>
  `;
}

// ── Event binding ──
function bindEvents() {
  // Key test area
  const keyTest = document.getElementById('keyTestArea');
  if (keyTest) {
    keyTest.addEventListener('keydown', (e) => {
      e.preventDefault();
      const result = document.getElementById('keyTestResult');
      const isValid = e.key === ' ' || e.key === 't' || e.key === 'T';
      keyTest.textContent = `Tecla: "${e.key === ' ' ? 'Espaço' : e.key}" (code: ${e.code})`;
      if (result) {
        result.textContent = isValid ? '✅ Tecla reconhecida! Vai funcionar na reunião.' : `⚠️ Use Espaço ou T`;
        result.className = `text-xs mt-1 ${isValid ? 'text-emerald-400' : 'text-amber-400'}`;
      }
    });
  }

  // Data bindings
  document.querySelectorAll('[data-bind]').forEach(el => {
    const evt = (el.tagName === 'TEXTAREA' || el.tagName === 'SELECT') ? 'change' : 'input';
    el.addEventListener(evt, () => {
      const key = el.dataset.bind;
      const val = el.type === 'range' ? Number(el.value) : el.value;
      console.log(`[BIND] ${key} = ${val} (tag=${el.tagName}, evt=${evt})`);
      state.config[key] = val;
      if (el.tagName !== 'TEXTAREA') render();
    });
  });

  // Actions
  document.querySelectorAll('[data-action]').forEach(el => {
    const action = el.dataset.action;
    const handler = el.tagName === 'SELECT' || el.type === 'file' ? 'change' : 'click';

    if (action === 'updateParticipant') {
      el.addEventListener('input', () => {
        const i = parseInt(el.dataset.idx);
        const field = el.dataset.field;
        const oldName = state.config.participants[i].name;
        state.config.participants[i][field] = el.value;
        // Update target if name changed
        if (field === 'name' && state.config.suggestions_target === oldName) {
          state.config.suggestions_target = el.value;
        }
      });
      return;
    }

    el.addEventListener(handler, async () => {
      switch (action) {
        case 'setTab':
          state.tab = el.dataset.val;
          render();
          break;
        case 'setProvider':
          state.config.transcription_provider = el.dataset.val;
          render();
          break;
        case 'setDiar':
          state.config.diarization_provider = el.dataset.val;
          render();
          break;
        case 'selectDevice':
          console.log(`[SELECT DEVICE] type=${el.dataset.type}, value="${el.value}"`);
          if (el.dataset.type === 'mic') {
            state.config.mic_device_id = el.value;
            state.micTest = 'idle';
          } else {
            state.config.monitor_device_id = el.value;
            state.monitorTest = 'idle';
          }
          render();
          break;
        case 'testDevice': {
          const type = el.dataset.type;
          const devId = type === 'mic' ? state.config.mic_device_id : state.config.monitor_device_id;
          if (!devId || devId === 'none') break;
          if (type === 'mic') state.micTest = 'testing'; else state.monitorTest = 'testing';
          render();
          callApi('test_device', devId, type === 'mic' ? 'input' : 'monitor');
          break;
        }
        case 'validateAws':
          state.awsValid = 'testing'; state.awsInfo = ''; render();
          try {
            const info = await callApi('validate_aws', state.config.aws_profile, state.config.aws_region);
            state.awsValid = 'ok'; state.awsInfo = info || 'OK';
          } catch (e) { state.awsValid = 'fail'; state.awsInfo = String(e); }
          render();
          break;
        case 'addParticipant':
          state.config.participants.push({ name: '', role: '' });
          render();
          // Focus the new name input
          setTimeout(() => {
            const inputs = document.querySelectorAll('[data-action="updateParticipant"][data-field="name"]');
            if (inputs.length) inputs[inputs.length - 1].focus();
          }, 50);
          break;
        case 'removeParticipant': {
          const removed = state.config.participants[parseInt(el.dataset.idx)];
          state.config.participants.splice(parseInt(el.dataset.idx), 1);
          if (removed && state.config.suggestions_target === removed.name) {
            state.config.suggestions_target = '';
          }
          render();
          break;
        }
        case 'setTarget': {
          const p = state.config.participants[parseInt(el.dataset.idx)];
          if (p && p.name) {
            state.config.suggestions_target = state.config.suggestions_target === p.name ? '' : p.name;
          }
          render();
          break;
        }
        case 'selectTemplate': {
          const tpl = el.value;
          if (tpl === 'custom') {
            document.getElementById('promptFileInput')?.click();
          } else if (tpl) {
            const content = await callApi('load_prompt_template', tpl);
            if (content) {
              state.config.custom_system_prompt = content;
              render();
            }
          }
          break;
        }
        case 'loadPromptFile':
          if (el.files && el.files[0]) {
            const reader = new FileReader();
            reader.onload = (ev) => {
              state.config.custom_system_prompt = ev.target.result;
              render();
            };
            reader.readAsText(el.files[0]);
          }
          break;
        case 'startMeeting':
          await callApi('save_config', state.config);
          await callApi('start_meeting', state.config);
          state.page = 'meeting';
          state.transcript = [];
          state.suggestions = [];
          state.timerStart = Date.now();
          startTimer();
          render();
          break;
        case 'toggleRec':
          await callApi('toggle_recording');
          break;
        case 'setResponseMode':
          state.config.response_mode = el.dataset.val;
          render();
          break;
        case 'setAutoResponse':
          state.config.auto_response = el.dataset.val === 'true';
          render();
          break;
        case 'setParticipantMode':
          state.config.participant_mode = el.dataset.val;
          render();
          break;
        case 'triggerTranscription':
          if (!state.isProcessing) {
            state.isProcessing = true;
            const btn = document.getElementById('triggerBtn');
            if (btn) { btn.disabled = true; btn.className = 'px-6 py-2 rounded text-sm font-medium bg-violet-800 text-violet-400 cursor-wait animate-pulse'; btn.innerHTML = '⏳ Processando...'; }
            // Add loading indicators
            const tArea = document.getElementById('transcript-area');
            if (tArea) {
              const ld = document.createElement('div');
              ld.className = 'loading-indicator text-sm text-violet-400 animate-pulse';
              ld.textContent = '⏳ Transcrevendo e analisando...';
              tArea.appendChild(ld);
              tArea.scrollTop = tArea.scrollHeight;
            }
            await callApi('trigger_transcription');
          }
          break;
        case 'stopMeeting':
          stopTimer();
          await callApi('stop_meeting');
          state.summary = '';
          state.summaryLoading = false;
          state.page = 'summary';
          render();
          break;
        case 'generateReport': {
          const instruction = document.getElementById('reportInstruction')?.value || '';
          state.summaryLoading = true;
          render();
          try {
            const report = await callApi('generate_final_report', instruction);
            state.summary = report || '';
          } catch(e) { state.summary = 'Erro: ' + e; }
          state.summaryLoading = false;
          render();
          break;
        }
        case 'copySummary':
          navigator.clipboard.writeText(state.summary);
          break;
        case 'saveSummary': {
          const blob = new Blob([state.summary], {type: 'text/markdown'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'reuniao-' + new Date().toISOString().slice(0,10) + '.md';
          a.click();
          URL.revokeObjectURL(url);
          break;
        }
        case 'newMeeting':
          state.page = 'setup';
          state.transcript = [];
          state.suggestions = [];
          state.summary = '';
          render();
          break;
      }
    });
  });
}

// ── Timer ──
function startTimer() {
  timerInterval = setInterval(() => {
    if (!state.timerStart) return;
    const elapsed = Math.floor((Date.now() - state.timerStart) / 1000);
    const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
    const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    state.timerDisplay = `${h}:${m}:${s}`;
    // Update timer display without full re-render
    const timerEl = document.querySelector('.font-mono');
    if (timerEl) timerEl.textContent = state.timerDisplay;
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ── Backend events ──
window.addEventListener('backend:transcript', (e) => {
  state.transcript.push(e.detail);
  if (state.page === 'meeting') {
    const area = document.getElementById('transcript-area');
    if (area) {
      const loading = area.querySelector('.loading-indicator');
      if (loading) loading.remove();
      
      const entry = e.detail;
      const isTarget = entry.speaker === state.config.suggestions_target;
      const div = document.createElement('div');
      div.className = 'text-sm fade-in';
      const speakerSpan = `<span class="font-semibold ${isTarget ? 'text-emerald-400' : 'text-blue-400'}">[${entry.speaker}]</span> `;
      div.innerHTML = speakerSpan + '<span class="text-slate-300 typewriter"></span>';
      area.appendChild(div);
      // Typewriter effect
      const tw = div.querySelector('.typewriter');
      let i = 0;
      const text = entry.text;
      const interval = setInterval(() => {
        if (i < text.length) {
          tw.textContent += text.charAt(i);
          i += Math.min(3, text.length - i); // 3 chars at a time for speed
          area.scrollTop = area.scrollHeight;
        } else {
          tw.textContent = text;
          clearInterval(interval);
        }
      }, 8);
    }
  }
});

window.addEventListener('backend:copilot_response', (e) => {
  const { response, had_instruction } = e.detail;
  state.isProcessing = false;
  if (response) state.suggestions.push(response);
  render();

  if (state.page === 'meeting') {
    const area = document.getElementById('suggestions-area');
    if (area) {
      const placeholder = area.querySelector('.italic');
      if (placeholder) placeholder.remove();

      // Fade old entries
      area.querySelectorAll('.copilot-entry').forEach(el => {
        el.classList.add('opacity-30');
        el.classList.remove('opacity-100');
      });

      if (response) {
        const div = document.createElement('div');
        div.className = 'copilot-entry text-sm fade-in mb-2 opacity-100 transition-opacity duration-500';
        div.innerHTML = `<span class="text-amber-400 font-medium">${had_instruction ? '💬' : '→'}</span> <span class="text-slate-100">${response}</span>`;
        area.appendChild(div);
      } else {
        const div = document.createElement('div');
        div.className = 'text-sm text-slate-500 italic fade-in mb-2';
        div.textContent = '— Sem resposta neste trecho —';
        area.appendChild(div);
      }
      area.scrollTop = area.scrollHeight;
    }
  }
});

window.addEventListener('backend:recording_done', (e) => {
  state.isProcessing = false;
  state.isRecording = false;
  render();
});

window.addEventListener('backend:recording_state', (e) => {
  state.isRecording = e.detail.recording;
  render();
});

window.addEventListener('backend:recording_stopped', (e) => {
  state.isRecording = false;
  render();
});

window.addEventListener('backend:submit_started', () => {
  state.isProcessing = true;
  render();
});

window.addEventListener('backend:speaker_map', (e) => {
  const map = e.detail;
  state.transcript = state.transcript.map(entry => {
    const resolved = map[entry.speaker];
    return resolved ? { ...entry, speaker: resolved } : entry;
  });
  if (state.page === 'meeting') render();
});

window.addEventListener('backend:audio_level', (e) => {
  const { source, deviceId, level } = e.detail;
  const src = source || (deviceId?.includes('monitor') || deviceId?.includes('.monitor') ? 'monitor' : 'mic');
  if (src === 'mic') state.micLevel = level;
  else state.monitorLevel = level;
  // Update VU meters without full re-render
  if (state.page === 'meeting') {
    const bars = document.querySelectorAll('.vu-bar');
    if (bars[0] && src === 'mic') bars[0].style.width = Math.min(level * 500, 100) + '%';
    if (bars[1] && src === 'monitor') bars[1].style.width = Math.min(level * 500, 100) + '%';
  }
  // Update test VU meters on setup page
  if (state.page === 'setup' && (state.micTest === 'testing' || state.monitorTest === 'testing')) {
    render();
  }
});

window.addEventListener('backend:test_level', (e) => {
  const { deviceId, level } = e.detail;
  const isMic = !deviceId.includes('monitor') && !deviceId.includes('loopback');
  if (isMic) state.micLevel = level;
  else state.monitorLevel = level;
  const bar = document.getElementById(isMic ? 'vu-mic' : 'vu-monitor');
  if (bar) bar.style.width = Math.min(level * 500, 100) + '%';
});

window.addEventListener('backend:test_done', (e) => {
  const { deviceId, peak } = e.detail;
  const isMic = !deviceId.includes('monitor') && !deviceId.includes('loopback');
  const hasAudio = peak > (isMic ? 0.003 : 0.001);
  if (isMic) { state.micTest = hasAudio ? 'ok' : 'fail'; state.micLevel = 0; }
  else { state.monitorTest = hasAudio ? 'ok' : 'fail'; state.monitorLevel = 0; }
  render();
});

window.addEventListener('backend:error', (e) => {
  console.error('Backend error:', e.detail);
  // Show toast
  const toast = document.createElement('div');
  toast.className = 'fixed top-4 right-4 bg-red-900/90 border border-red-700 text-red-200 px-4 py-2 rounded-lg text-sm z-50 fade-in';
  toast.textContent = e.detail.message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 5000);
});

// Keyboard shortcut
window.addEventListener('keydown', (e) => {
  if (state.page !== 'meeting') return;
  if (e.ctrlKey && e.shiftKey && e.key === 'S') {
    e.preventDefault();
    document.querySelector('[data-action="stopMeeting"]')?.click();
  }
  // Space/T = toggle recording
  if ((e.key === ' ' || e.key === 't' || e.key === 'T') && state.page === 'meeting' && !state.isProcessing && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault();
    document.querySelector('[data-action="toggleRec"]')?.click();
  }
});

// ── Init ──
window.addEventListener('pywebviewready', async () => {
  try {
    const saved = await callApi('load_config');
    if (saved) Object.assign(state.config, saved);
  } catch(e) { console.error('load_config error:', e); }

  try {
    state.devices = await callApi('list_audio_devices') || [];
  } catch(e) { console.error('list_audio_devices error:', e); }

  const inputDevs = state.devices.filter(d => d.deviceType === 'input');
  const monitorDevs = state.devices.filter(d => d.deviceType === 'output' || d.deviceType === 'monitor');
  
  const recommendedInput = inputDevs.find(d => d.recommended);
  if (recommendedInput && !state.config.mic_device_id) {
    state.config.mic_device_id = recommendedInput.id;
  }
  
  const recommendedMonitor = monitorDevs.find(d => d.recommended);
  if (recommendedMonitor && !state.config.monitor_device_id) {
    state.config.monitor_device_id = recommendedMonitor.id;
  }

  render();
});

// Fallback if pywebviewready doesn't fire or init fails
setTimeout(async () => {
  if (!document.querySelector('#app').innerHTML.trim()) {
    console.log('Fallback render triggered');
    try {
      const a = api();
      if (a) {
        const saved = await a.load_config();
        if (saved) Object.assign(state.config, saved);
        state.devices = await a.list_audio_devices() || [];
      }
    } catch(e) { console.error('Fallback init error:', e); }
    render();
  }
}, 2000);
</script>
